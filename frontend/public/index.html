<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tour Concierge</title>
<style>
:root {
  --primary: #0078d4;
  --accent: #00bcf2;
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-2: #1a1a25;
  --text: #ffffff;
  --text-muted: #8b8b9e;
  --border: #2a2a3a;
  --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --glow: 0 0 20px rgba(0, 188, 242, 0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
.app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; width: 100%; }
header { padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 16px; }
.logo { width: 48px; height: 48px; background: var(--gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--glow); }
header h1 { font-size: 1.5rem; font-weight: 600; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header p { color: var(--text-muted); font-size: 0.875rem; }
.agents { display: flex; gap: 8px; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
.agent-btn { padding: 10px 20px; border: 1px solid var(--border); border-radius: 24px; background: var(--surface-2); color: var(--text); cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
.agent-btn:hover { border-color: var(--accent); background: rgba(0, 188, 242, 0.1); }
.agent-btn.active { background: var(--gradient); border-color: transparent; box-shadow: var(--glow); }
.chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.message { max-width: 85%; padding: 14px 18px; border-radius: 16px; line-height: 1.5; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-self: flex-end; background: var(--gradient); border-bottom-right-radius: 4px; }
.message.assistant { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.message .agent-label { font-size: 0.75rem; color: var(--accent); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.welcome { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.welcome h2 { font-size: 1.75rem; margin-bottom: 12px; color: var(--text); }
.welcome p { margin-bottom: 24px; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.suggestion { padding: 10px 16px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
.suggestion:hover { border-color: var(--accent); background: rgba(0, 188, 242, 0.1); }
.input-area { padding: 20px 24px; background: var(--surface); border-top: 1px solid var(--border); }
.input-wrapper { display: flex; gap: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 8px; transition: border-color 0.2s; }
.input-wrapper:focus-within { border-color: var(--accent); box-shadow: var(--glow); }
#messageInput { flex: 1; background: transparent; border: none; color: var(--text); font-size: 1rem; padding: 8px 12px; outline: none; }
#messageInput::placeholder { color: var(--text-muted); }
#sendBtn { padding: 12px 24px; background: var(--gradient); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
#sendBtn:hover { transform: scale(1.02); box-shadow: var(--glow); }
#sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.typing { display: flex; gap: 4px; padding: 14px 18px; background: var(--surface-2); border-radius: 16px; width: fit-content; }
.typing span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
.typing span:nth-child(1) { animation-delay: -0.32s; }
.typing span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
.footer { text-align: center; padding: 12px; color: var(--text-muted); font-size: 0.75rem; }
.footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
</body>
  <div id="root"></div>
</body>
</html>
